        /* === Reset and Base === */

        /* Mobile Responsive Improvements */

            /* Larger legend items on mobile */

            /* Make graph take full viewport height */
            #mynetwork {
                height: calc(100vh - 100px) !important;

        @media (min-width: 769px) and (max-width: 1024px) {
