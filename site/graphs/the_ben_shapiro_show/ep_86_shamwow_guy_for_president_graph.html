        /* === Reset and Base === */
        * {

            /* Make info boxes full width on mobile */

            /* Larger legend items on mobile */

                font-size: 1.1rem !important;

            /* Make graph take full viewport height */
            #mynetwork {
                height: calc(100vh - 100px) !important;

        /* Tablet optimization */
