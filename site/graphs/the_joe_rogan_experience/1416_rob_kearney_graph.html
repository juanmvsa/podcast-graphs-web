        /* === Reset and Base === */
        * {

            /* Larger legend items on mobile */

                width: 20px !important;

            /* Increase font sizes on mobile */

            /* Make graph take full viewport height */
            #mynetwork {
                height: calc(100vh - 100px) !important;

                -webkit-tap-highlight-color: transparent;
