<!DOCTYPE html>
<html>
<head>
    <title>JSON Test</title>
</head>
<body>
    <h1>Testing index.json</h1>
    <pre id="result">Loading...</pre>
    <script>
        fetch('index.json')
            .then(r => {
                const msg = `Status: ${r.status}\nContent-Type: ${r.headers.get('content-type')}`;
                document.getElementById('result').textContent = msg;
                return r.json();
            })
            .then(data => {
                const current = document.getElementById('result').textContent;
                document.getElementById('result').textContent = current + `\nShows: ${data.totalShows}\nEpisodes: ${data.totalEpisodes}`;
            })
            .catch(e => {
                document.getElementById('result').textContent = `Error: ${e.message}`;
            });
    </script>
</body>
</html>
